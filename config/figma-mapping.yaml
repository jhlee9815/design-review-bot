version: 2

project:
  name: UNO HOME
  figmaFileKey: SXPVingkmqkrcLzcXYFsZd

pathResolution:
  base: config-dir
  description: All relative paths in this file are resolved from the directory containing this config file.

# Hybrid node mapping (Phase 5-1.5):
#   figmaNodeId   : primary lookup. bind.ts/preflight가 자동 갱신.
#   figmaNodeName : ID 미스 시 fallback (Figma 노드 이름).
#   figmaNodePath : 동명 충돌 시 tiebreaker (부모 경로 배열).
# 세 값이 모두 null인 항목은 `npm run figma:bind`로 일괄 채움.

tokens:
  source:
    file: ../../tokens.json
  output:
    css: ../src/index.css
  automation:
    classes:
      - token
    apply: auto

