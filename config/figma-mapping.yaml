  # NotificationCard 폐기 → NotificationListItem 도입 (2026-05-06).
  # 이유: 알림 페이지가 독립 카드 대신 리스트 아이템 구조로 통합 (Figma 179:11395 기준).
  # 잠정 결정:
  #   - Figma Design System에 정식 ComponentSet 미구성 상태. Notifications 페이지의 첫 List 프레임(179:11404, actions variant)을
  #     reference로 사용. 추후 Design System에 NotificationListItem ComponentSet 구성 시 figmaNodeId/Path 갱신 필요.
  #   - 4 variants (Notifications 페이지 내부 인스턴스):
  #       actions      → 179:11404
  #       confirmed    → 179:11417
  #       status-text  → 179:11428
  #       none         → 179:11439, 179:11448
  #   - apply: report-only — 정식 ComponentSet 생기기 전까진 자동 반영 보류 (variant 매칭 불안정).
  #     코드 마이그레이션(⑤) 완료 후 baseline 재산출(⑥) 시점에 partial로 승격 검토.
  notificationListItem:
    figmaNodeId: "179:11404"
    figmaNodeName: "List"
    figmaNodePath: ["Settings > Notifications", "Container", "Contents", "Device Access"]
    code: ../src/compositions/NotificationListItem.tsx
    targetType: composite-component
    automation:
      apply: report-only
      allowedClasses:
        - token
        - text
        - component-props
        - layout
  modalDialog:
